# GPU node group for static GPUPool (onprem-static). Apply after cluster exists.
# Usage: eksctl create nodegroup -f config/eks/gpu-nodegroup.yaml
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: opencoda-dev
  region: us-east-1

managedNodeGroups:
  - name: gpu-static
    instanceType: g5.xlarge
    desiredCapacity: 1
    minSize: 0
    maxSize: 2
    volumeSize: 200
    labels:
      opencoda.dev/gpu: "true"
      opencoda.dev/pool: onprem-static
      opencoda.dev/buffer-eligible: "true"
    taints:
      - key: opencoda.io/gpu
        value: "true"
        effect: NoSchedule
    preBootstrapCommands:
      - |
        set -euo pipefail
        mkdir -p /etc/containerd/certs.d/ghcr.io
        cat >/etc/containerd/certs.d/ghcr.io/hosts.toml <<'EOF'
        server = "https://ghcr.io"
        [host."https://ghcr.io"]
          capabilities = ["pull", "resolve"]
        EOF
        if ! command -v nydusd >/dev/null 2>&1; then
          curl -fsSL https://github.com/dragonflyoss/image-service/releases/download/v2.3.0/nydus-snapshotter-v2.3.0-linux-amd64.tar.gz \
            | tar -xz -C /usr/local/bin nydusd nydus-image 2>/dev/null || true
        fi
