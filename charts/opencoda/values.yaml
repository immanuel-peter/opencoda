namespace: opencoda-system

imageRegistry: ghcr.io/immanuel-peter/opencoda

imagePullSecrets: []

controllerManager:
  image: ghcr.io/immanuel-peter/opencoda/coda-controller-manager:latest
  replicas: 1
  fakeHealth: false
  joinToken: ""

gateway:
  image: ghcr.io/immanuel-peter/opencoda/coda-gateway:latest
  port: 8090
  serviceType: LoadBalancer

webhook:
  image: ghcr.io/immanuel-peter/opencoda/coda-webhook:latest

studio:
  enabled: true
  image: ghcr.io/immanuel-peter/opencoda/coda-studio:latest
  port: 3000

nodeAgent:
  enabled: true
  image: ghcr.io/immanuel-peter/opencoda/coda-node-agent:latest

garage:
  enabled: true
  endpoint: http://garage.opencoda-system.svc:3900
  bucket: coda-artifacts

registry:
  url: ghcr.io/immanuel-peter/opencoda

providers:
  aws:
    enabled: true
    region: us-east-1
    credentialsSecret: aws-credentials
  gcp:
    enabled: true
    region: us-central1
    credentialsSecret: gcp-credentials
  static:
    enabled: true

credentials:
  aws:
    create: false
    secretName: aws-credentials
  gcp:
    create: false
    secretName: gcp-credentials

spegel:
  enabled: true
  image: ghcr.io/spegel-org/spegel:v0.0.22

controlPlane:
  nodeSelector:
    opencoda.dev/control-plane: "true"
