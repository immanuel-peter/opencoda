apiVersion: v1
kind: ServiceAccount
metadata:
  name: coda-controller-manager
  namespace: {{ .Values.namespace }}
{{- with .Values.imagePullSecrets }}
imagePullSecrets:
  {{- toYaml . | nindent 2 }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: coda-controller-manager
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "pods/eviction", "secrets", "services", "namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["opencoda.dev"]
    resources: ["*"]
    verbs: ["*"]
  - apiGroups: ["opencoda.dev"]
    resources: ["*/status"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: coda-controller-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: coda-controller-manager
subjects:
  - kind: ServiceAccount
    name: coda-controller-manager
    namespace: {{ .Values.namespace }}
