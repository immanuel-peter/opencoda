name: Publish images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: opencoda images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - parallel:
          - name: coda-controller-manager
            uses: docker/build-push-action@v6
            with:
              context: .
              file: hack/Dockerfile.controller
              push: true
              tags: ghcr.io/immanuel-peter/opencoda/coda-controller-manager:latest

          - name: coda-gateway
            uses: docker/build-push-action@v6
            with:
              context: .
              file: hack/Dockerfile.gateway
              push: true
              tags: ghcr.io/immanuel-peter/opencoda/coda-gateway:latest

          - name: coda-studio
            uses: docker/build-push-action@v6
            with:
              context: .
              file: hack/Dockerfile.studio
              push: true
              tags: ghcr.io/immanuel-peter/opencoda/coda-studio:latest
